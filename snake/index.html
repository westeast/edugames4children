<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儿童贪吃蛇 - 学习游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: white;
            font-size: 36px;
            margin: 40px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            text-align: center;
        }

        .game-wrapper {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: nowrap;
            max-width: 1000px;
            width: 100%;
        }

        .info-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            min-width: 200px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .info-item {
            margin-bottom: 15px;
        }

        .info-label {
            font-weight: bold;
            color: #555;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 24px;
            font-weight: bold;
            color: #4CAF50;
        }

        .game-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }

        select, button {
            padding: 8px 15px;
            border: 2px solid #4CAF50;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select {
            background: white;
        }

        button {
            background: #4CAF50;
            color: white;
            height: 40px;
            padding: 0 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
        }

        .game-area {
            position: relative;
            background: #f0f0f0;
            border: 2px solid #333;
            border-radius: 10px;
            margin: 20px 0;
            outline: none;
        }

        .game-area:focus {
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(25, 1fr);
            grid-template-rows: repeat(25, 1fr);
            gap: 0;
        }

        .grid-cell {
            border: 0.5px solid #ddd;
        }

        .snake-head {
            position: absolute;
            background: linear-gradient(90deg, #4CAF50 0%, #3d8b40 100%);
            border-radius: 60% 40% 40% 60%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            z-index: 2;
            animation: pulse 1s infinite, slither 0.5s infinite alternate;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
        }

        .snake-head::before,
        .snake-head::after {
            content: '';
            position: absolute;
            width: 3px;
            height: 3px;
            background: black;
            border-radius: 50%;
            top: 30%;
        }

        .snake-head::before {
            left: 20%;
        }

        .snake-head::after {
            right: 30%;
        }

        .snake-tongue {
            position: absolute;
            width: 5px;
            height: 8px;
            background: #ff6b6b;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            bottom: 20%;
            right: 15%;
            animation: flicker 0.5s infinite alternate;
        }

        @keyframes flicker {
            0% { transform: translateX(0); }
            100% { transform: translateX(3px); }
        }

        .snake-body {
            position: absolute;
            background: linear-gradient(90deg, #45a049 0%, #3d8b40 100%);
            border-radius: 50%;
            z-index: 1;
            animation: slither 0.5s infinite alternate;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
        }

        .snake-body-segment {
            position: absolute;
            background: linear-gradient(90deg, #45a049 0%, #3d8b40 100%);
            border-radius: 50%;
            z-index: 1;
            animation: slither 0.5s infinite alternate;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
        }

        @keyframes slither {
            0% { transform: scaleX(1) scaleY(1); }
            100% { transform: scaleX(1.1) scaleY(0.9); }
        }

        .food {
            position: absolute;
            background: #f44336;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            z-index: 0;
            animation: bounce 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes bounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .status {
            margin: 20px 0;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            z-index: 100;
        }

        .game-over h2 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        .game-over p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .game-over button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        .game-over button:hover {
            background: #45a049;
        }

        @media (max-width: 900px) {
            .game-wrapper {
                flex-direction: column;
                align-items: center;
            }

            .info-panel {
                width: 100%;
                max-width: 600px;
                display: flex;
                justify-content: space-around;
                flex-wrap: wrap;
            }

            .info-item {
                margin: 10px;
            }

            .controls {
                flex-direction: column;
                align-items: center;
            }

            .button-group {
                flex-direction: column;
                width: 100%;
                align-items: center;
            }

            .button-group button {
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <h1>🎮 儿童贪吃蛇 - 学习游戏</h1>
    
    <div class="game-wrapper">
        <div class="info-panel">
            <div class="info-item">
                <div class="info-label">得分</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">长度</div>
                <div class="info-value" id="length">1</div>
            </div>
            <div class="info-item">
                <div class="info-label">速度</div>
                <div class="info-value" id="speed">1</div>
            </div>
            <div class="info-item">
                <div class="info-label">状态</div>
                <div class="info-value" id="status">准备开始</div>
            </div>
        </div>
        
        <div class="game-container">
            <div class="controls">
                <div class="control-group">
                    <label for="foodType">食物类型：</label>
                    <select id="foodType">
                        <option value="number">1. 数字</option>
                        <option value="initial">2. 拼音声母</option>
                        <option value="final">3. 拼音韵母</option>
                        <option value="uppercase">4. 大写字母</option>
                        <option value="lowercase">5. 小写字母</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="difficulty">难度：</label>
                    <select id="difficulty">
                        <option value="1">1. 简单</option>
                        <option value="2">2. 中等</option>
                        <option value="3">3. 困难</option>
                    </select>
                </div>
                <div class="button-group">
                    <button id="startBtn">开始</button>
                    <button id="pauseBtn">暂停</button>
                    <button id="restartBtn">重新开始</button>
                </div>
            </div>

            <div class="status" id="gameStatus">按开始键开始游戏</div>
            
            <div class="game-area" id="gameArea" tabindex="0">
                <div class="grid" id="grid"></div>
            </div>
        </div>
    </div>

    <script>
        // 游戏状态
        const gameState = {
            snake: [{x: 5, y: 12}],
            direction: 'right',
            food: null,
            score: 0,
            speed: 300,
            gameOver: false,
            paused: false,
            foodType: 'number',
            difficulty: 1,
            gameInterval: null
        };

        // 显示内容数据
        const displayData = {
            number: Array.from({length: 255}, (_, i) => (i + 1).toString()),
            initial: ['b', 'p', 'm', 'f', 'd', 't', 'n', 'l', 'g', 'k', 'h', 'j', 'q', 'x', 'zh', 'ch', 'sh', 'r', 'z', 'c', 's', 'y', 'w'],
            final: ['a', 'o', 'e', 'i', 'u', 'ü', 'ai', 'ei', 'ui', 'ao', 'ou', 'iu', 'ie', 'üe', 'er', 'an', 'en', 'in', 'un', 'ün', 'ang', 'eng', 'ing', 'ong'],
            uppercase: Array.from({length: 26}, (_, i) => String.fromCharCode(65 + i)),
            lowercase: Array.from({length: 26}, (_, i) => String.fromCharCode(97 + i))
        };

        // 声音对象
        const sounds = {
            eat: new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAD'),
            gameOver: new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAD'),
            start: new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAD')
        };

        // 游戏区域大小
        const gridSize = 25;
        const cellSize = 25;

        // 初始化游戏区域
        function initGameArea() {
            const gameArea = document.getElementById('gameArea');
            const grid = document.getElementById('grid');
            
            gameArea.style.width = `${gridSize * cellSize}px`;
            gameArea.style.height = `${gridSize * cellSize}px`;
            
            grid.style.width = `${gridSize * cellSize}px`;
            grid.style.height = `${gridSize * cellSize}px`;
            
            grid.innerHTML = '';
            
            for (let i = 0; i < gridSize; i++) {
                for (let j = 0; j < gridSize; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.style.width = `${cellSize}px`;
                    cell.style.height = `${cellSize}px`;
                    grid.appendChild(cell);
                }
            }
        }

        // 初始化游戏
        function initGame() {
            // 移除游戏结束弹层
            const gameOverElement = document.querySelector('.game-over');
            if (gameOverElement) {
                gameOverElement.remove();
            }
            
            // 设置焦点到游戏区域
            const gameArea = document.getElementById('gameArea');
            gameArea.focus();
            
            gameState.snake = [{x: 5, y: 12}];
            gameState.direction = 'right';
            gameState.score = 0;
            gameState.gameOver = false;
            gameState.paused = false;
            gameState.speed = 300 - (gameState.difficulty - 1) * 50;
            
            if (gameState.gameInterval) {
                clearInterval(gameState.gameInterval);
            }
            
            generateFood();
            renderGame();
            updateInfo();
            updateStatus('准备开始');
            document.getElementById('gameStatus').textContent = '按开始键开始游戏，使用方向键控制';
        }

        // 生成食物
        function generateFood() {
            let foodX, foodY;
            let collision;
            
            do {
                foodX = Math.floor(Math.random() * gridSize);
                foodY = Math.floor(Math.random() * gridSize);
                
                collision = gameState.snake.some(segment => segment.x === foodX && segment.y === foodY);
            } while (collision);
            
            const type = gameState.foodType;
            const data = displayData[type];
            const content = data[Math.floor(Math.random() * data.length)];
            
            gameState.food = {x: foodX, y: foodY, content: content};
        }

        // 渲染游戏
        function renderGame() {
            const gameArea = document.getElementById('gameArea');
            
            // 清除之前的元素
            // 移除所有子元素，只保留grid
            const grid = document.getElementById('grid');
            gameArea.innerHTML = '';
            gameArea.appendChild(grid);
            
            // 渲染蛇头
            const head = gameState.snake[0];
            const snakeHead = document.createElement('div');
            snakeHead.className = 'snake-head';
            snakeHead.style.width = `${cellSize - 2}px`;
            snakeHead.style.height = `${cellSize - 2}px`;
            snakeHead.style.left = `${head.x * cellSize + 1}px`;
            snakeHead.style.top = `${head.y * cellSize + 1}px`;
            
            // 添加舌头
            const tongue = document.createElement('div');
            tongue.className = 'snake-tongue';
            snakeHead.appendChild(tongue);
            
            gameArea.appendChild(snakeHead);
            
            // 渲染蛇身
            for (let i = 1; i < gameState.snake.length; i++) {
                const segment = gameState.snake[i];
                
                // 创建身体 segment
                const snakeBody = document.createElement('div');
                snakeBody.className = 'snake-body';
                snakeBody.style.width = `${cellSize - 2}px`;
                snakeBody.style.height = `${cellSize - 2}px`;
                snakeBody.style.left = `${segment.x * cellSize + 1}px`;
                snakeBody.style.top = `${segment.y * cellSize + 1}px`;
                gameArea.appendChild(snakeBody);
                
                // 添加连接效果 - 连接当前 segment 和前一个 segment
                const prevSegment = gameState.snake[i - 1];
                const connector = document.createElement('div');
                connector.style.position = 'absolute';
                connector.style.background = 'linear-gradient(90deg, #45a049 0%, #3d8b40 100%)';
                connector.style.zIndex = '0';
                
                // 计算连接方向和大小
                if (prevSegment.x === segment.x) {
                    // 垂直连接
                    const y = Math.min(prevSegment.y, segment.y) * cellSize + cellSize / 2;
                    const height = Math.abs(prevSegment.y - segment.y) * cellSize;
                    connector.style.width = `${cellSize - 2}px`;
                    connector.style.height = `${height}px`;
                    connector.style.left = `${prevSegment.x * cellSize + 1}px`;
                    connector.style.top = `${y}px`;
                } else {
                    // 水平连接
                    const x = Math.min(prevSegment.x, segment.x) * cellSize + cellSize / 2;
                    const width = Math.abs(prevSegment.x - segment.x) * cellSize;
                    connector.style.width = `${width}px`;
                    connector.style.height = `${cellSize - 2}px`;
                    connector.style.left = `${x}px`;
                    connector.style.top = `${prevSegment.y * cellSize + 1}px`;
                }
                
                gameArea.appendChild(connector);
                
                // 如果是最后一个 segment，添加尾巴
                if (i === gameState.snake.length - 1) {
                    const tailSegment = gameState.snake[i];
                    const tail = document.createElement('div');
                    tail.style.position = 'absolute';
                    tail.style.background = 'linear-gradient(90deg, #45a049 0%, #3d8b40 100%)';
                    tail.style.zIndex = '0';
                    
                    // 计算尾巴方向和位置
                    if (prevSegment.x === tailSegment.x) {
                        // 垂直尾巴
                        if (prevSegment.y < tailSegment.y) {
                            // 尾巴向下
                            tail.style.width = `${cellSize - 8}px`;
                            tail.style.height = `${cellSize * 0.7}px`;
                            tail.style.left = `${tailSegment.x * cellSize + 5}px`;
                            tail.style.top = `${tailSegment.y * cellSize + cellSize * 0.3}px`;
                        } else {
                            // 尾巴向上
                            tail.style.width = `${cellSize - 8}px`;
                            tail.style.height = `${cellSize * 0.7}px`;
                            tail.style.left = `${tailSegment.x * cellSize + 5}px`;
                            tail.style.top = `${tailSegment.y * cellSize}px`;
                        }
                    } else {
                        // 水平尾巴
                        if (prevSegment.x < tailSegment.x) {
                            // 尾巴向右
                            tail.style.width = `${cellSize * 0.7}px`;
                            tail.style.height = `${cellSize - 8}px`;
                            tail.style.left = `${tailSegment.x * cellSize + cellSize * 0.3}px`;
                            tail.style.top = `${tailSegment.y * cellSize + 5}px`;
                        } else {
                            // 尾巴向左
                            tail.style.width = `${cellSize * 0.7}px`;
                            tail.style.height = `${cellSize - 8}px`;
                            tail.style.left = `${tailSegment.x * cellSize}px`;
                            tail.style.top = `${tailSegment.y * cellSize + 5}px`;
                        }
                    }
                    
                    tail.style.borderRadius = '50%';
                    gameArea.appendChild(tail);
                }
            }
            
            // 渲染食物
            if (gameState.food) {
                const food = gameState.food;
                const foodElement = document.createElement('div');
                foodElement.className = 'food';
                foodElement.style.width = `${cellSize - 2}px`;
                foodElement.style.height = `${cellSize - 2}px`;
                foodElement.style.left = `${food.x * cellSize + 1}px`;
                foodElement.style.top = `${food.y * cellSize + 1}px`;
                foodElement.textContent = food.content;
                gameArea.appendChild(foodElement);
            }
        }

        // 更新游戏
        function updateGame() {
            if (gameState.gameOver || gameState.paused) return;
            
            // 移动蛇
            const head = {x: gameState.snake[0].x, y: gameState.snake[0].y};
            
            switch (gameState.direction) {
                case 'up':
                    head.y--;
                    break;
                case 'down':
                    head.y++;
                    break;
                case 'left':
                    head.x--;
                    break;
                case 'right':
                    head.x++;
                    break;
            }
            
            // 检查边界碰撞
            if (head.x < 0 || head.x >= gridSize || head.y < 0 || head.y >= gridSize) {
                gameOver();
                return;
            }
            
            // 检查自身碰撞
            if (gameState.snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }
            
            // 检查食物碰撞
            if (gameState.food && head.x === gameState.food.x && head.y === gameState.food.y) {
                // 吃到食物
                gameState.score += 10;
                gameState.snake.unshift(head);
                playSound('eat');
                speakContent(gameState.food.content);
                generateFood();
            } else {
                // 移动蛇
                gameState.snake.unshift(head);
                gameState.snake.pop();
            }
            
            renderGame();
            updateInfo();
        }

        // 游戏结束
        function gameOver() {
            gameState.gameOver = true;
            if (gameState.gameInterval) {
                clearInterval(gameState.gameInterval);
            }
            playSound('gameOver');
            updateStatus('游戏结束');
            showGameOver();
        }

        // 显示游戏结束画面
        function showGameOver() {
            const gameArea = document.getElementById('gameArea');
            const gameOverElement = document.createElement('div');
            gameOverElement.className = 'game-over';
            gameOverElement.innerHTML = `
                <h2>游戏结束</h2>
                <p>得分：${gameState.score}</p>
                <button id="restartBtn2">重新开始</button>
            `;
            gameArea.appendChild(gameOverElement);
            
            document.getElementById('restartBtn2').addEventListener('click', initGame);
        }

        // 更新信息面板
        function updateInfo() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('length').textContent = gameState.snake.length;
            document.getElementById('speed').textContent = gameState.difficulty;
        }

        // 更新状态
        function updateStatus(text) {
            document.getElementById('status').textContent = text;
            document.getElementById('gameStatus').textContent = text;
        }

        // 播放声音
        function playSound(type) {
            if (sounds[type]) {
                sounds[type].currentTime = 0;
                sounds[type].play().catch(e => console.log('Error playing sound:', e));
            }
        }

        // 朗读内容
        function speakContent(content) {
            if ('speechSynthesis' in window) {
                // 为汉语拼音声母和韵母提供正确的发音
                const pinyinMap = {
                    // 声母
                    'b': '玻', 'p': '坡', 'm': '摸', 'f': '佛',
                    'd': '得', 't': '特', 'n': '讷', 'l': '勒',
                    'g': '哥', 'k': '科', 'h': '喝',
                    'j': '基', 'q': '欺', 'x': '希',
                    'zh': '知', 'ch': '吃', 'sh': '诗', 'r': '日',
                    'z': '资', 'c': '雌', 's': '思', 'y': '衣', 'w': '乌',
                    // 韵母
                    'a': '啊', 'o': '喔', 'e': '鹅', 'i': '衣', 'u': '乌', 'ü': '迂',
                    'ai': '爱', 'ei': '诶', 'ui': '威', 'ao': '熬', 'ou': '欧', 'iu': '优',
                    'ie': '耶', 'üe': '约', 'er': '儿',
                    'an': '安', 'en': '恩', 'in': '因', 'un': '温', 'ün': '晕',
                    'ang': '昂', 'eng': '亨', 'ing': '英', 'ong': '轰'
                };
                
                // 检查是否是汉语拼音
                let speakContent = content;
                if (pinyinMap[content]) {
                    speakContent = pinyinMap[content];
                }
                
                const utterance = new SpeechSynthesisUtterance(speakContent);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.9;
                utterance.pitch = 1.1;
                speechSynthesis.speak(utterance);
            }
        }

        // 开始游戏
        function startGame() {
            if (gameState.gameOver || gameState.gameInterval) {
                initGame();
            }
            
            // 设置焦点到游戏区域
            const gameArea = document.getElementById('gameArea');
            gameArea.focus();
            
            gameState.paused = false;
            gameState.gameInterval = setInterval(updateGame, gameState.speed);
            playSound('start');
            updateStatus('游戏进行中');
        }

        // 暂停游戏
        function pauseGame() {
            if (gameState.gameOver) return;
            
            gameState.paused = !gameState.paused;
            
            if (gameState.paused) {
                clearInterval(gameState.gameInterval);
                updateStatus('游戏暂停');
            } else {
                gameState.gameInterval = setInterval(updateGame, gameState.speed);
                updateStatus('游戏进行中');
            }
        }

        // 处理键盘输入
        function handleKeyDown(e) {
            // 阻止方向键的默认行为（防止页面滚动）
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                e.preventDefault();
            }
            
            // 处理开始游戏的按键（空格或回车）
            if (e.key === ' ' || e.key === 'Enter') {
                startGame();
                return;
            }
            
            // 处理方向键 - 简化逻辑，确保所有方向键都能正常响应
            switch (e.key) {
                case 'ArrowUp':
                    // 只有当前方向不是向下时才允许向上
                    if (gameState.direction !== 'down') {
                        gameState.direction = 'up';
                    }
                    break;
                case 'ArrowDown':
                    // 只有当前方向不是向上时才允许向下
                    if (gameState.direction !== 'up') {
                        gameState.direction = 'down';
                    }
                    break;
                case 'ArrowLeft':
                    // 只有当前方向不是向右时才允许向左
                    if (gameState.direction !== 'right') {
                        gameState.direction = 'left';
                    }
                    break;
                case 'ArrowRight':
                    // 只有当前方向不是向左时才允许向右
                    if (gameState.direction !== 'left') {
                        gameState.direction = 'right';
                    }
                    break;
            }
        }

        // 为文档和游戏区域添加键盘事件监听
        document.addEventListener('keydown', handleKeyDown);
        document.getElementById('gameArea').addEventListener('keydown', handleKeyDown);

        // 事件监听
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('pauseBtn').addEventListener('click', pauseGame);
        document.getElementById('restartBtn').addEventListener('click', initGame);
        document.getElementById('foodType').addEventListener('change', function() {
            gameState.foodType = this.value;
            if (gameState.food) {
                generateFood();
                renderGame();
            }
        });
        document.getElementById('difficulty').addEventListener('change', function() {
            gameState.difficulty = parseInt(this.value);
            gameState.speed = 300 - (gameState.difficulty - 1) * 50;
            if (gameState.gameInterval) {
                clearInterval(gameState.gameInterval);
                gameState.gameInterval = setInterval(updateGame, gameState.speed);
            }
            updateInfo();
        });

        // 初始化游戏
        initGameArea();
        initGame();
    </script>
</body>
</html>
